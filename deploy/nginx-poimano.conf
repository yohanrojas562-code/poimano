# ─────────────────────────────────────────────────────────────
# Poimano SaaS – Nginx config
# Handles: poimano.com, *.poimano.com, and custom tenant domains
# ─────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect for poimano domains
server {
    listen 80;
    server_name poimano.com *.poimano.com;
    return 301 https://$host$request_uri;
}

# HTTP catch-all for custom domains (needed for Certbot HTTP challenge)
server {
    listen 80 default_server;
    server_name _;

    # Let Certbot validate domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS – poimano.com + *.poimano.com (main wildcard cert)
server {
    listen 443 ssl;
    server_name poimano.com *.poimano.com;

    root /var/www/poimano/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 25M;

    ssl_certificate /etc/letsencrypt/live/poimano.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poimano.com-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# HTTPS catch-all – Custom tenant domains (individual certs via Certbot)
server {
    listen 443 ssl default_server;
    server_name _;

    root /var/www/poimano/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 25M;

    # Self-signed fallback cert (used before Certbot issues a real one)
    ssl_certificate /etc/nginx/ssl/fallback.crt;
    ssl_certificate_key /etc/nginx/ssl/fallback.key;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
